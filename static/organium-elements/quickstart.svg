<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&amp;display=swap');
      text { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="rgb(156,181,176)"/>

  <!-- Header band -->
  <rect width="900" height="72" fill="#2f3635"/>
  <text x="36" y="30" font-size="10" fill="rgba(255,255,255,0.45)" font-weight="600" letter-spacing="2">ORGANIUM ELEMENTS</text>
  <text x="36" y="54" font-size="22" fill="white" font-weight="400" letter-spacing="-0.5">QUICKSTART GUIDE</text>

  <!-- Yellow label — wider padding -->
  <rect x="728" y="16" width="148" height="34" fill="rgb(255,237,0)"/>
  <text x="802" y="38" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.5" text-anchor="middle">IIL · ORGANIUM</text>

  <!-- Step grid: 3 columns × 2 rows -->

  <!-- Step 1 -->
  <rect x="24" y="96" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="24" y="96" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="38" y="115" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">1</text>
  <text x="62" y="115" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">FIRST-TIME SETUP</text>
  <rect x="24" y="124" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="36" y="148" font-size="12" fill="rgba(47,54,53,0.85)">Double-click</text>
  <text x="36" y="165" font-size="12" fill="#2f3635" font-weight="600">setup.command</text>
  <text x="36" y="182" font-size="12" fill="rgba(47,54,53,0.85)">in the project folder.</text>
  <text x="36" y="207" font-size="12" fill="rgba(47,54,53,0.85)">Installs dependencies and</text>
  <text x="36" y="224" font-size="12" fill="rgba(47,54,53,0.85)">connects your GitHub repo.</text>

  <!-- Step 2 -->
  <rect x="316" y="96" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="316" y="96" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="330" y="115" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">2</text>
  <text x="354" y="115" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">START THE ADMIN</text>
  <rect x="316" y="124" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="328" y="148" font-size="12" fill="rgba(47,54,53,0.85)">Double-click</text>
  <text x="328" y="165" font-size="12" fill="#2f3635" font-weight="600">admin.command</text>
  <text x="328" y="182" font-size="12" fill="rgba(47,54,53,0.85)">to launch the CMS. Your</text>
  <text x="328" y="199" font-size="12" fill="rgba(47,54,53,0.85)">browser will open at</text>
  <text x="328" y="216" font-size="12" fill="#2f3635" font-weight="600">localhost:5001</text>

  <!-- Step 3 -->
  <rect x="608" y="96" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="608" y="96" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="622" y="115" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">3</text>
  <text x="646" y="115" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">ADD COMPONENTS</text>
  <rect x="608" y="124" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="620" y="148" font-size="12" fill="rgba(47,54,53,0.85)">Click</text>
  <text x="648" y="148" font-size="12" fill="#2f3635" font-weight="600">+ New component.</text>
  <text x="620" y="165" font-size="12" fill="rgba(47,54,53,0.85)">Fill in title, type, status.</text>
  <text x="620" y="182" font-size="12" fill="rgba(47,54,53,0.85)">Write notes in Markdown.</text>
  <text x="620" y="199" font-size="12" fill="rgba(47,54,53,0.85)">Upload images directly</text>
  <text x="620" y="216" font-size="12" fill="rgba(47,54,53,0.85)">from the component editor.</text>

  <!-- Step 4 -->
  <rect x="24" y="306" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="24" y="306" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="38" y="325" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">4</text>
  <text x="62" y="325" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">CONTROL VISIBILITY</text>
  <rect x="24" y="334" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="36" y="358" font-size="12" fill="rgba(47,54,53,0.85)">Use the</text>
  <text x="82" y="358" font-size="12" fill="#2f3635" font-weight="600">👁 / 🚫 toggle</text>
  <text x="36" y="375" font-size="12" fill="rgba(47,54,53,0.85)">on each row to show or</text>
  <text x="36" y="392" font-size="12" fill="rgba(47,54,53,0.85)">hide a component on the</text>
  <text x="36" y="409" font-size="12" fill="rgba(47,54,53,0.85)">public site without deleting.</text>

  <!-- Step 5 -->
  <rect x="316" y="306" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="316" y="306" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="330" y="325" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">5</text>
  <text x="354" y="325" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">PREVIEW LOCALLY</text>
  <rect x="316" y="334" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="328" y="358" font-size="12" fill="rgba(47,54,53,0.85)">Click</text>
  <text x="357" y="358" font-size="12" fill="#2f3635" font-weight="600">View site ↗</text>
  <text x="328" y="375" font-size="12" fill="rgba(47,54,53,0.85)">in the top bar, or run</text>
  <text x="328" y="392" font-size="12" fill="#2f3635" font-weight="600">npm run dev</text>
  <text x="328" y="409" font-size="12" fill="rgba(47,54,53,0.85)">Use ↻ Rebuild to refresh</text>
  <text x="328" y="426" font-size="12" fill="rgba(47,54,53,0.85)">after edits.</text>

  <!-- Step 6 -->
  <rect x="608" y="306" width="268" height="190" fill="rgba(255,255,255,0.18)"/>
  <rect x="608" y="306" width="28" height="28" fill="rgb(255,237,0)"/>
  <text x="622" y="325" font-size="13" fill="#2f3635" font-weight="700" text-anchor="middle">6</text>
  <text x="646" y="325" font-size="11" fill="#2f3635" font-weight="700" letter-spacing="1.2">PUBLISH</text>
  <rect x="608" y="334" width="268" height="1" fill="rgba(47,54,53,0.15)"/>
  <text x="620" y="358" font-size="12" fill="rgba(47,54,53,0.85)">Click</text>
  <text x="649" y="358" font-size="12" fill="#2f3635" font-weight="600">↑ Publish</text>
  <text x="620" y="375" font-size="12" fill="rgba(47,54,53,0.85)">in the top bar. Rebuilds</text>
  <text x="620" y="392" font-size="12" fill="rgba(47,54,53,0.85)">and pushes to GitHub Pages.</text>
  <text x="620" y="409" font-size="12" fill="rgba(47,54,53,0.85)">Changes will be live shortly after.</text>

  <!-- Footer line -->
  <rect x="24" y="504" width="852" height="1" fill="rgba(47,54,53,0.2)"/>
  <text x="36" y="516" font-size="10" fill="rgba(47,54,53,0.5)" letter-spacing="1">INTELLIGENT INSTRUMENTS LAB · iil.is · ORGANIUM ELEMENTS</text>
</svg>
